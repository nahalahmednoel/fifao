<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#030407">
<title>VELO — Advanced Matrix Streaming Engine</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --bg: #030407;
  --surface: #080a13;
  --surface-card: #0f1222;
  --border: rgba(255, 255, 255, 0.05);
  --accent: #2563eb;
  --accent-glow: rgba(37, 99, 235, 0.25);
  --live: #dc2626;
  --text: #ffffff;
  --text-muted: #64748b;
  --radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }

body::before {
  content: ''; position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(circle at 50% 0%, rgba(37, 99, 235, 0.08), transparent 50%);
}

.wrapper { width: 100%; max-width: 1440px; margin: 0 auto; padding: 24px; }
@media (max-width: 768px) { .wrapper { padding: 12px; } }

header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 24px;
}
.logo-pack { display: flex; align-items: center; gap: 12px; }
.logo-box {
  width: 38px; height: 38px; background: var(--accent); border-radius: 10px;
  display: grid; place-items: center; color: #fff; font-size: 16px;
  box-shadow: 0 0 20px var(--accent-glow);
}
.logo-title { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.engine-badge {
  display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600;
  padding: 6px 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 30px;
}
.pulse { width: 6px; height: 6px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }

.main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 24px; }
@media (max-width: 1024px) { .main-grid { grid-template-columns: 1fr; } }

/* Advanced Matrix Crop & Mask Window */
.player-host-card {
  background: #000; border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative;
}
.viewport-outer { 
  position: relative; 
  width: 100%; 
  padding-top: 56.25%; /* 16:9 Aspect Ratio Boundary */
  background: #000; 
  overflow: hidden; 
}

/* The Matrix Crop Core - Masking unwanted layout designs safely */
.crop-container-wrapper {
  position: absolute;
  top: 0; left: 0; width: 100%; height: 100%;
  overflow: hidden;
  z-index: 10;
}

/* Base style for target platform framing */
#targetMatrixFrame {
  position: absolute;
  border: 0;
  width: 100%;
  height: 100%;
  transform-origin: top left;
  transition: all 0.1s ease-in-out;
}

.stage-loader {
  position: absolute; inset: 0; background: #010204; z-index: 20;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  transition: opacity 0.4s ease;
}
.stage-loader.resolved { opacity: 0; pointer-events: none; }
.spinner {
  width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.05);
  border-top-color: var(--accent); border-radius: 50%; animation: rotateLoop 0.8s linear infinite;
}
@keyframes rotateLoop { to { transform: rotate(360deg); } }

.control-panel {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px; background: var(--surface); border-top: 1px solid var(--border); gap: 12px;
}
.meta-block { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; min-width: 0; }
#nowStreamingMeta { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
.live-tag {
  background: var(--live); color: #fff; font-size: 11px; font-weight: 800;
  padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
}
.utility-actions { display: flex; gap: 8px; }
.action-trigger {
  background: var(--surface-card); border: 1px solid var(--border); color: var(--text);
  padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s ease;
}
.action-trigger:hover { background: var(--accent); border-color: var(--accent); }

.sidebar-deck { display: flex; flex-direction: column; gap: 20px; }
.deck-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.deck-title { font-size: 15px; font-weight: 800; margin-bottom: 16px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); }

.matrix-list { display: flex; flex-direction: column; gap: 12px; max-height: 480px; overflow-y: auto; }
.matrix-list::-webkit-scrollbar { width: 4px; }
.matrix-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

.matrix-item {
  background: var(--surface-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px; display: flex; align-items: center;
  justify-content: space-between; cursor: pointer; transition: all 0.2s ease;
  width: 100%; text-align: left; color: #fff;
}
.matrix-item:hover, .matrix-item.active {
  border-color: var(--accent); background: rgba(37, 99, 235, 0.03);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.team-cluster { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
.team-node { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.flag-icon { width: 22px; height: 15px; object-fit: cover; border-radius: 2px; background: rgba(255,255,255,0.05); }

.schedule-cluster { text-align: right; display: flex; flex-direction: column; gap: 4px; min-width: 95px; flex-shrink: 0; }
.time-label { font-size: 12px; font-weight: 800; color: var(--accent); }
.date-label { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.badge-label {
  font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px;
  display: inline-block; text-transform: uppercase; text-align: center; margin-top: 2px; width: max-content; align-self: flex-end;
}
.badge-label.live-mode { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
.badge-label.upcoming-mode { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }

.fallback-state { text-align: center; color: var(--text-muted); padding: 40px 10px; font-size: 14px; }

footer {
  text-align: center; margin-top: 40px; padding: 24px;
  font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border);
}
</style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="logo-pack">
      <div class="logo-box"><i class="fa-solid fa-crop-simple"></i></div>
      <div class="logo-title">VELO</div>
    </div>
    <div class="engine-badge">
      <div class="pulse"></div>
      <span>CROP ATTR MATRIX ACTIVE</span>
    </div>
  </header>

  <div class="main-grid">
    <div class="stage-section">
      <div class="player-host-card" id="playerViewContainer">
        <div class="viewport-outer">
          <div class="stage-loader" id="stageLoader">
            <div class="spinner"></div>
          </div>
          
          <div class="crop-container-wrapper">
            <iframe id="targetMatrixFrame" src="" allowfullscreen scrolling="no" allow="autoplay; encrypted-media"></iframe>
          </div>
        </div>
        
        <div class="control-panel">
          <div class="meta-block">
            <span class="live-tag" id="nowStreamingStatus">OFFLINE</span>
            <span id="nowStreamingMeta">Select a verified matrix source</span>
          </div>
          <div class="utility-actions">
            <button class="action-trigger" onclick="requestFullscreenView()"><i class="fa-solid fa-expand"></i> Fullscreen</button>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar-deck">
      <div class="deck-card">
        <div class="deck-title">Live Node Hub</div>
        <div class="matrix-list" id="matrixContainer">
          <div class="fallback-state">Synchronizing secure crop mapping streams...</div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 VELO Broadcast Network. Dynamic Coordinate Masking Profile.
  </footer>
</div>

<script>
// !!! আপনার জেনারেট করা লেটেস্ট গুগল ওয়েব অ্যাপের URL-টি এখানে ইনপুট করুন !!!
const MAPPING_API_URL = "https://script.google.com/macros/s/AKfycbyK0EAXBANbTfZrxFBzXuy0Cmc1z4jsr8o9O0xs_sX5kOfLtEPfEYbC92ehvmVJICj7/exec";

const targetMatrixFrame = document.getElementById("targetMatrixFrame");
const stageLoader = document.getElementById("stageLoader");
const nowStreamingMeta = document.getElementById("nowStreamingMeta");
const nowStreamingStatus = document.getElementById("nowStreamingStatus");
const matrixContainer = document.getElementById("matrixContainer");

async function executeMatrixSync() {
  if(!MAPPING_API_URL || MAPPING_API_URL.includes("আপনার_গুগল_অ্যাপ")) {
    matrixContainer.innerHTML = `<div class="fallback-state" style="color:var(--live);">Configuration Missing: Embed script token inside HTML source.</div>`;
    return;
  }

  try {
    const res = await fetch(MAPPING_API_URL);
    const nodes = await res.json();
    
    if(!nodes || nodes.length === 0) {
      matrixContainer.innerHTML = `<div class="fallback-state">No target sources listed in matrix rows.</div>`;
      return;
    }

    matrixContainer.innerHTML = "";
    
    nodes.forEach((node, idx) => {
      const mode = node.status ? node.status.trim().toUpperCase() : "UPCOMING";
      const isLiveNow = mode === "LIVE";
      
      const itemBtn = document.createElement("button");
      itemBtn.className = `matrix-item ${idx === 0 ? 'active' : ''}`;
      
      // গুগল শিটের ক্রপিং মেটাডাটা এট্রিবিউটে পাস করা হচ্ছে
      itemBtn.setAttribute("data-url", node.stream_url || "");
      itemBtn.setAttribute("data-title", `${node.team1} vs ${node.team2}`);
      itemBtn.setAttribute("data-status", mode);
      itemBtn.setAttribute("data-top", node.crop_top || "0");
      itemBtn.setAttribute("data-bottom", node.crop_bottom || "0");
      itemBtn.setAttribute("data-left", node.crop_left || "0");
      itemBtn.setAttribute("data-right", node.crop_right || "0");
      itemBtn.setAttribute("data-zoom", node.zoom_factor || "1");
      
      itemBtn.innerHTML = `
        <div class="team-cluster">
          <div class="team-node">
            <img class="flag-icon" src="${node.team1_flag || 'https://placehold.co/30x20?text=•'}" onerror="this.src='https://placehold.co/30x20?text=•'">
            <span>${node.team1}</span>
          </div>
          <div class="team-node">
            <img class="flag-icon" src="${node.team2_flag || 'https://placehold.co/30x20?text=•'}" onerror="this.src='https://placehold.co/30x20?text=•'">
            <span>${node.team2}</span>
          </div>
        </div>
        <div class="schedule-cluster">
          <div class="time-label">${node.time}</div>
          <div class="date-label">${node.date}</div>
          <span class="badge-label ${isLiveNow ? 'live-mode' : 'upcoming-mode'}">${mode}</span>
        </div>
      `;

      itemBtn.onclick = () => renderCroppedMatrix(itemBtn);
      matrixContainer.appendChild(itemBtn);
    });

    if(nodes.length > 0) {
      const initialActive = matrixContainer.querySelector(".matrix-item");
      if(initialActive) renderCroppedMatrix(initialActive);
    }

  } catch (error) {
    console.error("Sync matrix error:", error);
    matrixContainer.innerHTML = `<div class="fallback-state" style="color:var(--live);">Handshake Fault: Endpoint unreachable.</div>`;
  }
}

function renderCroppedMatrix(element) {
  document.querySelectorAll(".matrix-item").forEach(el => el.classList.remove("active"));
  element.classList.add("active");

  const url = element.getAttribute("data-url");
  const title = element.getAttribute("data-title");
  const status = element.getAttribute("data-status");
  
  // ক্রপিং এবং জুম কোঅর্ডিনেট রিড করা হচ্ছে
  const cTop = element.getAttribute("data-top");
  const cBottom = element.getAttribute("data-bottom");
  const cLeft = element.getAttribute("data-left");
  const cRight = element.getAttribute("data-right");
  const zoom = element.getAttribute("data-zoom");

  stageLoader.classList.remove("resolved");
  
  nowStreamingMeta.textContent = title;
  nowStreamingStatus.textContent = status;
  nowStreamingStatus.style.background = status === "LIVE" ? "var(--live)" : "var(--text-muted)";

  if(url) {
    targetMatrixFrame.src = url;
    
    // সিএসএস ক্যালকুলেশন ম্যাট্রিক্স দিয়ে আইফ্রেম পজিশনিং ও সাইজ ক্রপ লক করা
    targetMatrixFrame.style.width = `calc(100% + ${parseInt(cLeft) + parseInt(cRight)}px)`;
    targetMatrixFrame.style.height = `calc(100% + ${parseInt(cTop) + parseInt(cBottom)}px)`;
    targetMatrixFrame.style.top = `-${cTop}px`;
    targetMatrixFrame.style.left = `-${cLeft}px`;
    targetMatrixFrame.style.transform = `scale(${zoom})`;
  } else {
    targetMatrixFrame.src = "about:blank";
  }

  targetMatrixFrame.onload = () => {
    stageLoader.classList.add("resolved");
  };
}

function requestFullscreenView() {
  const container = document.getElementById("playerViewContainer");
  if (!document.fullscreenElement) {
    if (container.requestFullscreen) {
      container.requestFullscreen().then(() => {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("landscape").catch(() => {});
        }
      });
    }
  } else {
    document.exitFullscreen().catch(() => {});
  }
}

window.addEventListener("DOMContentLoaded", executeMatrixSync);
</script>
</body>
</html>
