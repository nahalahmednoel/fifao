<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="referrer" content="no-referrer">
<meta name="theme-color" content="#040509">
<title>VELO — Next Generation Live Streaming Platform</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

<style>
:root {
  --background: #040509;
  --surface: #0a0c16;
  --surface-card: #121526;
  --border-line: rgba(255, 255, 255, 0.05);
  --color-accent: #2563eb;
  --accent-glow: rgba(37, 99, 235, 0.25);
  --color-live: #ef4444;
  --text-primary: #ffffff;
  --text-muted: #64748b;
  --border-radius: 16px;
}

* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--background); color: var(--text-primary); overflow-x: hidden; min-height: 100vh; }

body::before {
  content: ''; position: fixed; inset: 0; z-index: -1;
  background: radial-gradient(circle at 50% 0%, rgba(37, 99, 235, 0.1), transparent 50%);
}

.app-container { width: 100%; max-width: 1440px; margin: 0 auto; padding: 24px; }
@media (max-width: 768px) { .app-container { padding: 12px; } }

/* Premium Navigation Header */
header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 18px 24px; background: var(--surface); border: 1px solid var(--border-line);
  border-radius: var(--border-radius); margin-bottom: 24px;
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.2);
}
.brand-wrapper { display: flex; align-items: center; gap: 12px; }
.brand-icon {
  width: 38px; height: 38px; background: var(--color-accent); border-radius: 10px;
  display: grid; place-items: center; color: #fff; font-size: 16px;
  box-shadow: 0 0 20px var(--accent-glow);
}
.brand-logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
.status-badge-container {
  display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600;
  padding: 6px 14px; background: rgba(255,255,255,0.02); border: 1px solid var(--border-line); border-radius: 30px;
}
.pulse-dot { width: 6px; height: 6px; background: #10b981; border-radius: 50%; box-shadow: 0 0 8px #10b981; }

/* Dashboard Core Grid Layout */
.dashboard-grid { display: grid; grid-template-columns: 1fr 380px; gap: 24px; }
@media (max-width: 1024px) { .dashboard-grid { grid-template-columns: 1fr; } }

/* Secure Advanced Player Architecture */
.player-wrapper-card {
  background: #000; border: 1px solid var(--border-line); border-radius: var(--border-radius);
  overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.5); position: relative;
}
.media-viewport { position: relative; width: 100%; padding-top: 56.25%; background: #000; }

/* The isolating wrapper to block unwanted design elements from source website */
.media-viewport iframe {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  border: 0; object-fit: cover; z-index: 10;
}

/* System Loader Interface */
.viewport-loader {
  position: absolute; inset: 0; background: #002; z-index: 20;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  transition: opacity 0.4s ease;
}
.viewport-loader.hidden-state { opacity: 0; pointer-events: none; }
.loading-spinner {
  width: 42px; height: 42px; border: 3px solid rgba(255,255,255,0.05);
  border-top-color: var(--color-accent); border-radius: 50%; animation: rotationLoop 0.8s linear infinite;
}
@keyframes rotationLoop { to { transform: rotate(360deg); } }

/* Player Sub-control Bar */
.player-control-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px; background: var(--surface); border-top: 1px solid var(--border-line); gap: 12px;
}
.stream-details-block { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 14px; min-width: 0; }
#nowPlayingTitle { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #fff; }
.live-status-tag {
  background: var(--color-live); color: #fff; font-size: 11px; font-weight: 800;
  padding: 4px 10px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; flex-shrink: 0;
}
.player-action-utilities { display: flex; gap: 8px; }
.utility-btn {
  background: var(--surface-card); border: 1px solid var(--border-line); color: var(--text-primary);
  padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 600;
  display: flex; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s ease;
}
.utility-btn:hover { background: var(--color-accent); border-color: var(--color-accent); }

/* Sidebar Control Panel */
.sidebar-panel { display: flex; flex-direction: column; gap: 20px; }
.panel-container-card {
  background: var(--surface); border: 1px solid var(--border-line);
  border-radius: var(--border-radius); padding: 20px;
}
.panel-headline { font-size: 15px; font-weight: 800; margin-bottom: 16px; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); }

.match-matrix-list { display: flex; flex-direction: column; gap: 12px; max-height: 480px; overflow-y: auto; }
.match-matrix-list::-webkit-scrollbar { width: 4px; }
.match-matrix-list::-webkit-scrollbar-thumb { background: var(--border-line); border-radius: 10px; }

/* Custom Row Item Cards */
.match-node-item {
  background: var(--surface-card); border: 1px solid var(--border-line);
  border-radius: 12px; padding: 14px; display: flex; align-items: center;
  justify-content: space-between; cursor: pointer; transition: all 0.2s ease;
  width: 100%; text-align: left; color: #fff;
}
.match-node-item:hover, .match-node-item.active-state {
  border-color: var(--color-accent); background: rgba(37, 99, 235, 0.03);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
}
.team-meta-wrapper { display: flex; flex-direction: column; gap: 6px; flex: 1; min-width: 0; }
.team-meta-row { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.flag-asset-icon { width: 22px; height: 15px; object-fit: cover; border-radius: 2px; background: rgba(255,255,255,0.05); }

.schedule-meta-block { text-align: right; display: flex; flex-direction: column; gap: 4px; min-width: 95px; flex-shrink: 0; }
.time-stamp { font-size: 12px; font-weight: 800; color: var(--color-accent); }
.date-stamp { font-size: 11px; color: var(--text-muted); font-weight: 600; }
.badge-stamp {
  font-size: 10px; font-weight: 800; padding: 2px 6px; border-radius: 4px;
  display: inline-block; text-transform: uppercase; text-align: center; margin-top: 2px; width: max-content; align-self: flex-end;
}
.badge-stamp.live-status { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
.badge-stamp.upcoming-status { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }

.terminal-empty-state { text-align: center; color: var(--text-muted); padding: 40px 10px; font-size: 14px; }

footer {
  text-align: center; margin-top: 40px; padding: 24px;
  font-size: 12px; color: var(--text-muted); border-top: 1px solid var(--border-line);
}
</style>
</head>
<body>

<div class="app-container">
  <header>
    <div class="brand-wrapper">
      <div class="brand-icon"><i class="fa-solid fa-satellite-dish"></i></div>
      <div class="brand-logo-text">VELO</div>
    </div>
    <div class="status-badge-container">
      <div class="pulse-dot"></div>
      <span>SECURE MATRIX STREAMING</span>
    </div>
  </header>

  <div class="dashboard-grid">
    <div class="stage-section">
      <div class="player-wrapper-card" id="interactivePlayerContainer">
        <div class="media-viewport">
          <div class="viewport-loader" id="viewportLoader">
            <div class="loading-spinner"></div>
          </div>
          <iframe id="isolatedVideoFrame" src="" allowfullscreen scrolling="no" allow="autoplay; encrypted-media" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
        </div>
        
        <div class="player-control-bar">
          <div class="stream-details-block">
            <span class="live-status-tag" id="currentStatusTag">OFFLINE</span>
            <span id="nowPlayingTitle">Awaiting channel selection from match matrix</span>
          </div>
          <div class="player-action-utilities">
            <button class="utility-btn" onclick="executeFullscreen()"><i class="fa-solid fa-expand"></i> Fullscreen</button>
          </div>
        </div>
      </div>
    </div>

    <div class="sidebar-panel">
      <div class="panel-container-card">
        <div class="panel-headline">Match Matrix Grid</div>
        <div class="match-matrix-list" id="matrixViewContainer">
          <div class="terminal-empty-state">Establishing handshake with cloud spreadsheet matrix...</div>
        </div>
      </div>
    </div>
  </div>

  <footer>
    &copy; 2026 VELO Broadcast Networks. All Interface Modules Synchronized via Secure Sandbox Architecture.
  </footer>
</div>

<script>
const DATABASE_MATRIX_URL = "https://static.cloudflareinsights.com/beacon.min.js/v833ccba57c9e4d2798f2e76cebdd09a11778172276447";

const isolatedVideoFrame = document.getElementById("isolatedVideoFrame");
const viewportLoader = document.getElementById("viewportLoader");
const nowPlayingTitle = document.getElementById("nowPlayingTitle");
const currentStatusTag = document.getElementById("currentStatusTag");
const matrixViewContainer = document.getElementById("matrixViewContainer");

async function pullCloudMatrixFeeds() {
  if(!DATABASE_MATRIX_URL || DATABASE_MATRIX_URL.includes("আপনার_গুগল_অ্যাপ")) {
    matrixViewContainer.innerHTML = `<div class="terminal-empty-state" style="color:var(--color-live);">Configuration Error: Please assign your Google Web App URL token inside index.html source script.</div>`;
    return;
  }

  try {
    const response = await fetch(DATABASE_MATRIX_URL);
    const dataNodes = await response.json();
    
    if(!dataNodes || dataNodes.length === 0) {
      matrixViewContainer.innerHTML = `<div class="terminal-empty-state">No dynamic sports streams initialized inside database matrix rows.</div>`;
      return;
    }

    matrixViewContainer.innerHTML = "";
    
    dataNodes.forEach((node, index) => {
      const mode = node.status ? node.status.trim().toUpperCase() : "UPCOMING";
      const isLiveActive = mode === "LIVE";
      
      const actionItem = document.createElement("button");
      actionItem.className = `match-node-item ${index === 0 ? 'active-state' : ''}`;
      actionItem.setAttribute("data-target-stream", node.stream_url || "");
      actionItem.setAttribute("data-meta-title", `${node.team1} vs ${node.team2}`);
      actionItem.setAttribute("data-current-state", mode);
      
      actionItem.innerHTML = `
        <div class="team-meta-wrapper">
          <div class="team-meta-row">
            <img class="flag-asset-icon" src="${node.team1_flag || 'https://placehold.co/30x20?text=•'}" onerror="this.src='https://placehold.co/30x20?text=•'">
            <span>${node.team1}</span>
          </div>
          <div class="team-meta-row">
            <img class="flag-asset-icon" src="${node.team2_flag || 'https://placehold.co/30x20?text=•'}" onerror="this.src='https://placehold.co/30x20?text=•'">
            <span>${node.team2}</span>
          </div>
        </div>
        <div class="schedule-meta-block">
          <div class="time-stamp">${node.time}</div>
          <div class="date-stamp">${node.date}</div>
          <span class="badge-stamp ${isLiveActive ? 'live-status' : 'upcoming-status'}">${mode}</span>
        </div>
      `;

      actionItem.onclick = () => routeStreamToViewport(actionItem);
      matrixViewContainer.appendChild(actionItem);
    });

    // Automatically trigger initialization of the first row matrix
    if(dataNodes.length > 0) {
      const standardNode = matrixViewContainer.querySelector(".match-node-item");
      if(standardNode) routeStreamToViewport(standardNode);
    }

  } catch (error) {
    console.error("Matrix compilation error:", error);
    matrixViewContainer.innerHTML = `<div class="terminal-empty-state" style="color:var(--color-live);">Synchronization Error: Failed to retrieve data packet from API engine.</div>`;
  }
}

function routeStreamToViewport(targetElement) {
  document.querySelectorAll(".match-node-item").forEach(el => el.classList.remove("active-state"));
  targetElement.classList.add("active-state");

  const rawStreamTarget = targetElement.getAttribute("data-target-stream");
  const parsedMetaTitle = targetElement.getAttribute("data-meta-title");
  const stateToken = targetElement.getAttribute("data-current-state");

  viewportLoader.classList.remove("hidden-state");
  
  nowPlayingTitle.textContent = parsedMetaTitle;
  currentStatusTag.textContent = stateToken;
  currentStatusTag.style.background = stateToken === "LIVE" ? "var(--color-live)" : "var(--text-muted)";

  if(rawStreamTarget) {
    isolatedVideoFrame.src = rawStreamTarget;
  } else {
    isolatedVideoFrame.src = "about:blank";
  }

  isolatedVideoFrame.onload = () => {
    viewportLoader.classList.add("hidden-state");
  };
}

function executeFullscreen() {
  const container = document.getElementById("interactivePlayerContainer");
  if (!document.fullscreenElement) {
    if (container.requestFullscreen) {
      container.requestFullscreen().then(() => {
        if (screen.orientation && screen.orientation.lock) {
          screen.orientation.lock("landscape").catch(() => {});
        }
      });
    } else if (container.webkitRequestFullscreen) {
      container.webkitRequestFullscreen();
    }
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    }
  }
}

window.addEventListener("DOMContentLoaded", pullCloudMatrixFeeds);
</script>
</body>
</html>
